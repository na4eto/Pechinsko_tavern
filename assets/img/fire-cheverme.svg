<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" role="img" aria-label="Илюстрация по снимка от механата: чеверме на шиш в зиданото огнище от светла тухла, с тава пърленки под него">
  <style>
    @keyframes emberFloat { 0% { transform: translateY(0); opacity: 0.9; } 50% { opacity: 0.35; } 100% { transform: translateY(-14px); opacity: 0; } }
    .ember-dot { animation: emberFloat 3.4s ease-in infinite; }
    .ember-dot:nth-of-type(2) { animation-delay: 1.2s; }
    .ember-dot:nth-of-type(3) { animation-delay: 2.1s; }
    @media (prefers-reduced-motion: reduce) { .ember-dot { animation: none; } }
  </style>
  <rect width="800" height="560" fill="#1B120C"/>

  <!-- зидано огнище от светла тухла -->
  <rect x="120" y="60" width="560" height="440" fill="#E8DCC2"/>
  <g stroke="#CBBD9E" stroke-width="1.8" opacity="0.9">
    <line x1="120" y1="88" x2="680" y2="88"/>
    <line x1="120" y1="116" x2="680" y2="116"/>
    <line x1="120" y1="144" x2="680" y2="144"/>
    <line x1="120" y1="172" x2="680" y2="172"/>
    <line x1="120" y1="200" x2="680" y2="200"/>
    <line x1="120" y1="228" x2="680" y2="228"/>
    <line x1="120" y1="256" x2="680" y2="256"/>
    <line x1="120" y1="284" x2="680" y2="284"/>
    <line x1="120" y1="312" x2="680" y2="312"/>
    <line x1="120" y1="340" x2="680" y2="340"/>
    <line x1="120" y1="368" x2="680" y2="368"/>
    <line x1="120" y1="396" x2="680" y2="396"/>
    <line x1="120" y1="424" x2="680" y2="424"/>
    <line x1="120" y1="452" x2="680" y2="452"/>
    <line x1="120" y1="480" x2="680" y2="480"/>
    <line x1="160" y1="60" x2="160" y2="88"/>
    <line x1="240" y1="60" x2="240" y2="88"/>
    <line x1="320" y1="60" x2="320" y2="88"/>
    <line x1="480" y1="60" x2="480" y2="88"/>
    <line x1="560" y1="60" x2="560" y2="88"/>
    <line x1="640" y1="60" x2="640" y2="88"/>
    <line x1="200" y1="88" x2="200" y2="116"/>
    <line x1="280" y1="88" x2="280" y2="116"/>
    <line x1="520" y1="88" x2="520" y2="116"/>
    <line x1="600" y1="88" x2="600" y2="116"/>
    <line x1="145" y1="116" x2="145" y2="144"/>
    <line x1="655" y1="116" x2="655" y2="144"/>
    <line x1="145" y1="200" x2="145" y2="228"/>
    <line x1="655" y1="200" x2="655" y2="228"/>
    <line x1="145" y1="284" x2="145" y2="312"/>
    <line x1="655" y1="284" x2="655" y2="312"/>
    <line x1="145" y1="368" x2="145" y2="396"/>
    <line x1="655" y1="368" x2="655" y2="396"/>
    <line x1="145" y1="452" x2="145" y2="480"/>
    <line x1="655" y1="452" x2="655" y2="480"/>
  </g>

  <!-- отвор на огнището (арка) -->
  <path d="M200 500 V300 a200 170 0 0 1 400 0 V500 Z" fill="#140D08"/>
  <path d="M200 500 V300 a200 170 0 0 1 400 0 V500" fill="none" stroke="#D9C9A6" stroke-width="7"/>

  <!-- ковано желязо по ъглите -->
  <g stroke="#2A2018" stroke-width="2.6" fill="none">
    <path d="M148 96 c14 -6 20 8 10 14 c-8 5 -16 -4 -10 -14 z"/>
    <path d="M138 130 c10 -10 24 2 16 12"/>
    <path d="M652 96 c-14 -6 -20 8 -10 14 c8 5 16 -4 10 -14 z"/>
    <path d="M662 130 c-10 -10 -24 2 -16 12"/>
  </g>

  <!-- сияние в огнището -->
  <circle cx="400" cy="400" r="150" fill="#A8402A" opacity="0.12"/>
  <circle cx="400" cy="430" r="90" fill="#C9A96A" opacity="0.1"/>

  <!-- шишът с чевермето -->
  <rect x="212" y="298" width="376" height="7" rx="3.5" fill="#6B5A45"/>
  <circle cx="212" cy="301" r="11" fill="none" stroke="#6B5A45" stroke-width="5"/>
  <path d="M212 290 L212 274 L228 278" fill="none" stroke="#6B5A45" stroke-width="5" stroke-linecap="round"/>
  <g>
    <ellipse cx="400" cy="302" rx="92" ry="35" fill="#33261C"/>
    <ellipse cx="400" cy="302" rx="92" ry="35" fill="none" stroke="#57402C" stroke-width="2"/>
    <path d="M318 316 C348 332 452 332 482 316" fill="none" stroke="#C9A96A" stroke-width="2.6" opacity="0.55" stroke-linecap="round"/>
