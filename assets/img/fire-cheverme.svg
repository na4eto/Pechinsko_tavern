    <rect x="354" y="268" width="5" height="66" fill="#140D08" opacity="0.55"/>
    <rect x="440" y="268" width="5" height="66" fill="#140D08" opacity="0.55"/>
  </g>

  <!-- тава с пърленки под чевермето -->
  <rect x="288" y="372" width="224" height="16" rx="4" fill="#57503F"/>
  <rect x="296" y="368" width="208" height="8" rx="3" fill="#6B6154"/>
  <g>
    <ellipse cx="330" cy="370" rx="26" ry="10" fill="#EFCD97"/>
    <ellipse cx="378" cy="368" rx="26" ry="10" fill="#E5BE85"/>
    <ellipse cx="424" cy="370" rx="26" ry="10" fill="#EFCD97"/>
    <ellipse cx="470" cy="368" rx="24" ry="9" fill="#E5BE85"/>
    <ellipse cx="326" cy="368" rx="6" ry="3" fill="#C99055"/>
    <ellipse cx="382" cy="366" rx="6" ry="3" fill="#C99055"/>
    <ellipse cx="428" cy="368" rx="6" ry="3" fill="#C99055"/>
  </g>

  <!-- огънят -->
  <path d="M400 496 C378 474 382 452 398 434 C403 445 411 446 414 439 C427 454 426 478 400 496 Z" fill="#8A3020"/>
  <path d="M400 494 C386 478 388 462 399 448 C402 456 409 456 411 451 C420 464 418 482 400 494 Z" fill="#A8402A"/>
  <path d="M400 491 C392 481 393 470 400 461 C402 466 407 467 408 463 C413 473 410 483 400 491 Z" fill="#D97E4A"/>
  <path d="M400 488 C396 483 396 476 400 471 C403 476 404 483 400 488 Z" fill="#E8B08E"/>
  <path d="M352 496 C344 486 346 476 353 468 C355 474 360 475 361 472 C367 482 363 490 352 496 Z" fill="#8A3020" opacity="0.85"/>
  <path d="M448 496 C440 486 442 474 449 466 C451 473 456 474 457 470 C463 481 459 490 448 496 Z" fill="#8A3020" opacity="0.85"/>
  <rect x="342" y="492" width="116" height="10" rx="5" fill="#4A3223"/>

  <!-- искри -->
  <g fill="#E8A25B">
    <circle class="ember-dot" cx="372" cy="428" r="3"/>
    <circle class="ember-dot" cx="412" cy="416" r="2.6"/>
    <circle class="ember-dot" cx="442" cy="432" r="2.2"/>
  </g>
  <g fill="#C9A96A" opacity="0.4">
    <circle cx="352" cy="442" r="1.8"/>
    <circle cx="454" cy="448" r="1.8"/>
  </g>

  <!-- каменна основа и дърва -->
  <rect x="96" y="500" width="608" height="60" fill="#3A2C20"/>
  <rect x="96" y="500" width="608" height="10" fill="#57503F"/>
  <g>
    <circle cx="636" cy="532" r="11" fill="#8A6E4B"/>
    <circle cx="636" cy="532" r="5" fill="#6B5334"/>
    <circle cx="660" cy="536" r="10" fill="#A8845A"/>
    <circle cx="660" cy="536" r="4.5" fill="#8A6E4B"/>
    <circle cx="648" cy="518" r="9" fill="#8A6E4B"/>
    <circle cx="648" cy="518" r="4" fill="#6B5334"/>
    <circle cx="152" cy="534" r="10" fill="#A8845A"/>
    <circle cx="152" cy="534" r="4.5" fill="#8A6E4B"/>
    <circle cx="172" cy="528" r="9" fill="#8A6E4B"/>
    <circle cx="172" cy="528" r="4" fill="#6B5334"/>
  </g>
</svg>
