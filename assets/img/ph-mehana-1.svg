<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Илюстрация по снимка на механата: бяла двуетажна сграда с еркер, тъмни греди, червен покрив и изписано „Механа Печинско“ на фасадата">
  <rect width="800" height="600" fill="#F7F0DE"/>

  <!-- рид и гора зад сградата -->
  <path d="M0 300 L140 250 L300 292 L470 244 L640 292 L800 258 V600 H0 Z" fill="#7C8A6B"/>
  <g fill="#3E5039">
    <path d="M20 470 l26 -62 26 62 z M28 434 l18 -46 18 46 z"/>
    <path d="M92 486 l22 -54 22 54 z"/>
    <path d="M660 462 l26 -64 26 64 z M668 426 l18 -44 18 44 z"/>
    <path d="M730 484 l22 -52 22 52 z"/>
    <path d="M148 500 l18 -42 18 42 z"/>
    <path d="M628 496 l18 -42 18 42 z"/>
  </g>

  <!-- комин -->
  <rect x="262" y="168" width="18" height="80" fill="#EDE6D6"/>
  <rect x="258" y="162" width="26" height="8" fill="#4A3A2B"/>
  <path d="M271 154 c-8 -16 8 -22 0 -40 c-5 -12 5 -16 3 -26" fill="none" stroke="#D9CDBA" stroke-width="5" stroke-linecap="round" opacity="0.6"/>

  <!-- покрив: червени керемиди, бели челни дъски -->
  <polygon points="184,244 400,150 616,244" fill="#964434"/>
  <path d="M184 244 L400 150 L616 244" fill="none" stroke="#F6F1E7" stroke-width="5" stroke-linejoin="round"/>
  <path d="M212 232 L400 150 M400 150 L588 232" stroke="#7A3428" stroke-width="1.6" opacity="0.5" fill="none"/>
  <rect x="180" y="240" width="440" height="8" rx="3" fill="#4A3F30"/>

  <!-- горен етаж -->
  <rect x="200" y="248" width="400" height="94" fill="#F6F1E7"/>
  <rect x="200" y="248" width="7" height="94" fill="#3A2C1E"/>
  <rect x="593" y="248" width="7" height="94" fill="#3A2C1E"/>

  <!-- прозорци горе с тъмни рамки и перденца -->
  <g>
    <rect x="236" y="256" width="42" height="46" fill="#2A2018"/>
    <rect x="234" y="254" width="46" height="50" fill="none" stroke="#33261C" stroke-width="4"/>
    <line x1="257" y1="256" x2="257" y2="302" stroke="#33261C" stroke-width="2.4"/>
    <path d="M238 258 l17 20 v-20 z M276 258 l-17 20 v-20 z" fill="#EFE9DC" opacity="0.9"/>
    <rect x="330" y="256" width="42" height="46" fill="#2A2018"/>
    <rect x="328" y="254" width="46" height="50" fill="none" stroke="#33261C" stroke-width="4"/>
    <line x1="351" y1="256" x2="351" y2="302" stroke="#33261C" stroke-width="2.4"/>
    <path d="M332 258 l17 20 v-20 z M370 258 l-17 20 v-20 z" fill="#EFE9DC" opacity="0.9"/>
    <rect x="428" y="256" width="42" height="46" fill="#2A2018"/>
    <rect x="426" y="254" width="46" height="50" fill="none" stroke="#33261C" stroke-width="4"/>
    <line x1="449" y1="256" x2="449" y2="302" stroke="#33261C" stroke-width="2.4"/>
    <path d="M430 258 l17 20 v-20 z M468 258 l-17 20 v-20 z" fill="#EFE9DC" opacity="0.9"/>
    <rect x="522" y="256" width="42" height="46" fill="#2A2018"/>
    <rect x="520" y="254" width="46" height="50" fill="none" stroke="#33261C" stroke-width="4"/>
    <line x1="543" y1="256" x2="543" y2="302" stroke="#33261C" stroke-width="2.4"/>
    <path d="M524 258 l17 20 v-20 z M562 258 l-17 20 v-20 z" fill="#EFE9DC" opacity="0.9"/>
  </g>

  <!-- фенери от ковано желязо -->
  <g>
    <path d="M304 262 q6 4 0 10" fill="none" stroke="#1B120C" stroke-width="2"/>
    <rect x="296" y="270" width="10" height="13" fill="#1B120C"/>
    <rect x="298.5" y="273" width="5" height="7" fill="#E8A25B"/>
    <path d="M496 262 q-6 4 0 10" fill="none" stroke="#1B120C" stroke-width="2"/>
    <rect x="494" y="270" width="10" height="13" fill="#1B120C"/>
    <rect x="496.5" y="273" width="5" height="7" fill="#E8A25B"/>
  </g>

  <!-- изписани надписи по фасадата -->
  <text x="400" y="330" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="bold" letter-spacing="9" fill="#4A3324">МЕХАНА</text>

  <!-- еркерна греда с конзоли -->
  <rect x="192" y="342" width="416" height="12" fill="#3A2C1E"/>
  <g fill="#33261C">
    <path d="M232 354 l8 10 h-16 z"/>
    <path d="M316 354 l8 10 h-16 z"/>
    <path d="M400 354 l8 10 h-16 z"/>
    <path d="M484 354 l8 10 h-16 z"/>
    <path d="M568 354 l8 10 h-16 z"/>
  </g>

  <!-- долен етаж (леко прибран, в сянка) -->
  <rect x="220" y="354" width="360" height="112" fill="#F0E8D6"/>
  <rect x="220" y="354" width="360" height="8" fill="#E4D9C2"/>
  <text x="400" y="392" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="bold" letter-spacing="5" fill="#4A3324">ПЕЧИНСКО</text>

  <!-- врата с топла светлина -->
  <rect x="366" y="400" width="68 " height="66" fill="#33261C"/>
  <rect x="372" y="406" width="24" height="54" fill="#E8A25B"/>
  <rect x="404" y="406" width="24" height="54" fill="#E8A25B"/>
  <line x1="372" y1="424" x2="396" y2="424" stroke="#33261C" stroke-width="2.4"/>
  <line x1="404" y1="424" x2="428" y2="424" stroke="#33261C" stroke-width="2.4"/>
  <line x1="372" y1="442" x2="396" y2="442" stroke="#33261C" stroke-width="2.4"/>
  <line x1="404" y1="442" x2="428" y2="442" stroke="#33261C" stroke-width="2.4"/>

  <!-- прозорци долу, осветени -->
  <g>
    <rect x="248" y="404" width="46" height="50" fill="none" stroke="#FAF5E8" stroke-width="5"/>
    <rect x="250" y="406" width="42" height="46" fill="#E8A25B"/>
    <rect x="249" y="405" width="44" height="48" fill="none" stroke="#33261C" stroke-width="3.4"/>
    <line x1="271" y1="406" x2="271" y2="452" stroke="#33261C" stroke-width="2.2"/>
    <line x1="250" y1="429" x2="292" y2="429" stroke="#33261C" stroke-width="2.2"/>
    <rect x="506" y="404" width="46" height="50" fill="none" stroke="#FAF5E8" stroke-width="5"/>
    <rect x="508" y="406" width="42" height="46" fill="#E8A25B"/>
    <rect x="507" y="405" width="44" height="48" fill="none" stroke="#33261C" stroke-width="3.4"/>
    <line x1="529" y1="406" x2="529" y2="452" stroke="#33261C" stroke-width="2.2"/>
    <line x1="508" y1="429" x2="550" y2="429" stroke="#33261C" stroke-width="2.2"/>
  </g>

  <!-- цокъл -->
  <rect x="220" y="458" width="360" height="10" fill="#4A3A2B"/>

  <!-- ограда от ковано желязо с месингови връхчета -->
  <g stroke="#241A13" stroke-width="3">
    <line x1="150" y1="486" x2="650" y2="486"/>
    <line x1="150" y1="530" x2="650" y2="530"/>
  </g>
  <g stroke="#241A13" stroke-width="3.4">
    <line x1="168" y1="478" x2="168" y2="534"/>
    <line x1="216" y1="478" x2="216" y2="534"/>
    <line x1="264" y1="478" x2="264" y2="534"/>
    <line x1="312" y1="478" x2="312" y2="534"/>
    <line x1="488" y1="478" x2="488" y2="534"/>
    <line x1="536" y1="478" x2="536" y2="534"/>
    <line x1="584" y1="478" x2="584" y2="534"/>
    <line x1="632" y1="478" x2="632" y2="534"/>
  </g>
  <g stroke="#241A13" stroke-width="1.8" fill="none" opacity="0.85">
    <path d="M180 496 c10 -8 22 8 32 0 M180 516 c10 8 22 -8 32 0"/>
    <path d="M228 496 c10 -8 22 8 32 0 M228 516 c10 8 22 -8 32 0"/>
    <path d="M276 496 c10 -8 22 8 32 0 M276 516 c10 8 22 -8 32 0"/>
    <path d="M500 496 c10 -8 22 8 32 0 M500 516 c10 8 22 -8 32 0"/>
    <path d="M548 496 c10 -8 22 8 32 0 M548 516 c10 8 22 -8 32 0"/>
    <path d="M596 496 c10 -8 22 8 32 0 M596 516 c10 8 22 -8 32 0"/>
  </g>
  <g fill="#C9A96A">
    <path d="M168 470 l4 8 h-8 z"/>
    <path d="M216 470 l4 8 h-8 z"/>
    <path d="M264 470 l4 8 h-8 z"/>
    <path d="M312 470 l4 8 h-8 z"/>
    <path d="M488 470 l4 8 h-8 z"/>
    <path d="M536 470 l4 8 h-8 z"/>
    <path d="M584 470 l4 8 h-8 z"/>
    <path d="M632 470 l4 8 h-8 z"/>
  </g>
  <!-- портички при входа -->
  <g stroke="#241A13" stroke-width="3.6">
    <line x1="360" y1="472" x2="360" y2="536"/>
    <line x1="440" y1="472" x2="440" y2="536"/>
  </g>
  <circle cx="360" cy="468" r="4" fill="#C9A96A"/>
  <circle cx="440" cy="468" r="4" fill="#C9A96A"/>

  <!-- път пред механата -->
  <path d="M0 600 C180 548 420 538 800 560 L800 600 Z" fill="#33422E"/>
  <path d="M40 600 C240 560 480 552 800 572" fill="none" stroke="#EFE6D0" stroke-width="11" stroke-linecap="round" opacity="0.9"/>
</svg>
