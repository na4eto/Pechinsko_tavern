    <rect x="644" y="226" width="12" height="32" rx="3" fill="#8A6E4B"/>
    <rect x="668" y="232" width="13" height="26" rx="3" fill="#A8402A"/>
    <rect x="694" y="224" width="12" height="34" rx="3" fill="#C9A96A"/>
