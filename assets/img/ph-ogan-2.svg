<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Илюстрация: скара на жар с кебапчета и зеленчуци">
  <style>
    @keyframes emberFloat { 0% { transform: translateY(0); opacity: 0.9; } 50% { opacity: 0.35; } 100% { transform: translateY(-14px); opacity: 0; } }
    .ember-dot { animation: emberFloat 3.4s ease-in infinite; }
    .ember-dot:nth-of-type(2) { animation-delay: 1.2s; }
    .ember-dot:nth-of-type(3) { animation-delay: 2.1s; }
    @media (prefers-reduced-motion: reduce) { .ember-dot { animation: none; } }
  </style>
  <rect width="800" height="600" fill="#1B120C"/>
  <circle cx="400" cy="360" r="230" fill="#A8402A" opacity="0.08"/>

  <!-- зидана рамка от светла тухла около скарата -->
  <g>
    <rect x="0" y="0" width="800" height="64" fill="#E8DCC2"/>
    <rect x="0" y="0" width="58" height="600" fill="#E8DCC2"/>
    <rect x="742" y="0" width="58" height="600" fill="#E8DCC2"/>
    <g stroke="#CBBD9E" stroke-width="1.7" opacity="0.9">
      <line x1="0" y1="22" x2="800" y2="22"/>
      <line x1="0" y1="44" x2="800" y2="44"/>
      <line x1="120" y1="0" x2="120" y2="22"/>
      <line x1="260" y1="0" x2="260" y2="22"/>
      <line x1="400" y1="0" x2="400" y2="22"/>
      <line x1="540" y1="0" x2="540" y2="22"/>
      <line x1="680" y1="0" x2="680" y2="22"/>
      <line x1="190" y1="22" x2="190" y2="44"/>
      <line x1="330" y1="22" x2="330" y2="44"/>
      <line x1="470" y1="22" x2="470" y2="44"/>
      <line x1="610" y1="22" x2="610" y2="44"/>
      <line x1="0" y1="120" x2="58" y2="120"/>
      <line x1="0" y1="200" x2="58" y2="200"/>
      <line x1="0" y1="280" x2="58" y2="280"/>
      <line x1="0" y1="360" x2="58" y2="360"/>
      <line x1="0" y1="440" x2="58" y2="440"/>
      <line x1="0" y1="520" x2="58" y2="520"/>
      <line x1="742" y1="120" x2="800" y2="120"/>
      <line x1="742" y1="200" x2="800" y2="200"/>
      <line x1="742" y1="280" x2="800" y2="280"/>
      <line x1="742" y1="360" x2="800" y2="360"/>
      <line x1="742" y1="440" x2="800" y2="440"/>
      <line x1="742" y1="520" x2="800" y2="520"/>
    </g>
    <line x1="58" y1="64" x2="742" y2="64" stroke="#D9C9A6" stroke-width="5"/>
    <line x1="58" y1="64" x2="58" y2="600" stroke="#D9C9A6" stroke-width="5"/>
    <line x1="742" y1="64" x2="742" y2="600" stroke="#D9C9A6" stroke-width="5"/>
  </g>

  <!-- жарава под скарата -->
  <g>
    <ellipse cx="400" cy="470" rx="270" ry="40" fill="#241A13"/>
    <ellipse cx="320" cy="458" rx="30" ry="10" fill="#8A3020"/>
    <ellipse cx="392" cy="464" rx="34" ry="11" fill="#A8402A"/>
    <ellipse cx="470" cy="456" rx="28" ry="9" fill="#8A3020"/>
    <ellipse cx="356" cy="452" rx="14" ry="6" fill="#D97E4A"/>
    <ellipse cx="436" cy="452" rx="12" ry="5" fill="#D97E4A"/>
  </g>
  <g fill="#E8A25B">
    <circle class="ember-dot" cx="340" cy="420" r="2.8"/>
    <circle class="ember-dot" cx="408" cy="410" r="2.4"/>
    <circle class="ember-dot" cx="460" cy="424" r="2"/>
  </g>

  <!-- решетка -->
  <g stroke="#57503F" stroke-width="7" stroke-linecap="round">
    <line x1="180" y1="330" x2="620" y2="330"/>
    <line x1="180" y1="366" x2="620" y2="366"/>
    <line x1="180" y1="402" x2="620" y2="402"/>
  </g>
  <g stroke="#454032" stroke-width="5" stroke-linecap="round" opacity="0.9">
    <line x1="220" y1="308" x2="220" y2="420"/>
    <line x1="580" y1="308" x2="580" y2="420"/>
  </g>

  <!-- кебапчета -->
  <g fill="#57402C">
    <rect x="252" y="312" width="120" height="26" rx="13"/>
    <rect x="252" y="350" width="120" height="26" rx="13"/>
    <rect x="428" y="312" width="120" height="26" rx="13"/>
  </g>
  <g fill="#6E4E33">
    <rect x="252" y="312" width="120" height="12" rx="6"/>
    <rect x="252" y="350" width="120" height="12" rx="6"/>
    <rect x="428" y="312" width="120" height="12" rx="6"/>
  </g>
  <g stroke="#33261C" stroke-width="3" opacity="0.7">
    <line x1="284" y1="312" x2="284" y2="338"/>
    <line x1="316" y1="312" x2="316" y2="338"/>
    <line x1="348" y1="312" x2="348" y2="338"/>
    <line x1="284" y1="350" x2="284" y2="376"/>
    <line x1="316" y1="350" x2="316" y2="376"/>
    <line x1="460" y1="312" x2="460" y2="338"/>
    <line x1="492" y1="312" x2="492" y2="338"/>
    <line x1="524" y1="312" x2="524" y2="338"/>
  </g>

  <!-- чушки на скарата -->
  <g>
    <path d="M430 358 c0 -8 10 -12 20 -12 c26 0 66 6 66 16 c0 10 -40 16 -66 16 c-10 0 -20 -4 -20 -12 z" fill="#A8402A"/>
    <path d="M430 358 c0 -8 10 -12 20 -12 c14 0 32 2 46 6 c-14 8 -32 12 -46 12 c-10 0 -20 -2 -20 -6 z" fill="#8A3020" opacity="0.7"/>
    <path d="M516 360 l14 -4" stroke="#42553F" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- дим -->
  <g fill="none" stroke="#C9BCA4" stroke-linecap="round" opacity="0.25">
    <path d="M300 292 c-8 -20 8 -28 0 -50" stroke-width="7"/>
    <path d="M480 288 c-7 -18 7 -26 0 -46" stroke-width="6"/>
  </g>
</svg>
